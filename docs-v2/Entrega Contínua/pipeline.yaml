name: Toca Aqui CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  build:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend-TocaAqui/package-lock.json

      - name: Install Dependencies
        run: npm install
        working-directory: ./backend-TocaAqui

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend-TocaAqui/package-lock.json

      - name: Install Dependencies
        run: npm install
        working-directory: ./backend-TocaAqui

      - name: Run Tests
        run: npm test
        working-directory: ./backend-TocaAqui

